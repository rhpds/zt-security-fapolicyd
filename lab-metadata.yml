# lab-metadata.yml
# Single Point of Truth for Lab Information

lab:
  name: "Security: File Access Policy (fapolicyd) Lab"
  shortname: "zt-security-fapolicyd"
  maintainer: "Joshua Loscar (jloscar@redhat.com)" 
  
  description:
    summary: "Learn how to configure and use file access policy (FAPolicyd) in Red Hat Enterprise Linux."
    goal: "You will be able to deploy and manage application control with FAPolicyd on Red Hat Enterprise Linux systems."
    concepts:
      - "Install File Access Policy Daemon (fapolicyd)"
      - "Verify fapolicyd configuration and block unauthorized applications"
      - "Create a file-based trust database to allow trusted applications"
      - "Configure integrity checking for fapolicyd"  
    use_case: "Get familliar with the new image mode for RHEL operating model"
    time_to_complete: "30" # time in minutes
    
  # Git references for deployment
  git_ref:
    production: "prod"
    development: "dev"

